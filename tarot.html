<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --pu:#6a0dad;--pud:#3a0060;--gold:#C8902A;--dark:#0d0020;
  --card-w:90px;--card-h:148px;
}
body{
  font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#1a0040 0%,#0d0020 60%,#000010 100%);
  color:#e8d5ff;min-height:100vh;
}

/* ── Stars bg ── */
#stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twk ease-in-out infinite;}
@keyframes twk{0%,100%{opacity:.05}50%{opacity:.5}}

/* ── Header ── */
.topbar{background:rgba(0,0,0,.5);color:rgba(255,255,255,.5);font-size:11px;padding:5px 16px;display:flex;justify-content:space-between;position:relative;z-index:10;}
.topbar a{color:rgba(200,144,42,.7);text-decoration:none;}
header{background:rgba(10,0,30,.8);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,144,42,.3);padding:12px 20px;display:flex;align-items:center;gap:14px;position:relative;z-index:10;}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.hdr-logo img{height:50px;width:50px;object-fit:contain;border-radius:8px;}
.hdr-logo h1{font-size:17px;color:#C8902A;font-weight:bold;}
.hdr-logo p{font-size:11px;color:rgba(200,180,255,.5);}
.hdr-back{margin-left:auto;font-size:12px;color:#C8902A;text-decoration:none;border:1px solid rgba(200,144,42,.4);border-radius:6px;padding:5px 12px;}

/* ── Main ── */
.wrap{max-width:780px;margin:0 auto;padding:24px 14px 50px;position:relative;z-index:1;}

/* ── Hero ── */
.hero{text-align:center;margin-bottom:32px;}
.hero-icon{font-size:48px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(200,144,42,.6));}
.hero h2{font-size:26px;font-weight:700;letter-spacing:4px;color:#C8902A;margin-bottom:6px;}
.hero p{font-size:13px;color:rgba(200,180,255,.5);letter-spacing:1px;}

/* ── Question ── */
.q-card{background:rgba(255,255,255,.04);border:1px solid rgba(200,144,42,.2);border-radius:16px;padding:20px;margin-bottom:20px;backdrop-filter:blur(8px);}
.q-label{font-size:12px;color:rgba(200,144,42,.7);letter-spacing:2px;margin-bottom:8px;}
.q-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(200,144,42,.25);border-radius:10px;color:#e8d5ff;font-size:15px;padding:12px 16px;outline:none;font-family:inherit;transition:border-color .2s;}
.q-input::placeholder{color:rgba(200,180,255,.25);}
.q-input:focus{border-color:rgba(200,144,42,.6);}

/* ── Spread selector ── */
.spread-row{display:flex;gap:10px;margin-bottom:20px;}
.spread-btn{flex:1;padding:12px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(200,144,42,.2);border-radius:10px;color:rgba(200,180,255,.6);cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;text-align:center;}
.spread-btn.active{background:rgba(200,144,42,.15);border-color:#C8902A;color:#C8902A;font-weight:bold;}
.spread-btn .spread-icon{font-size:18px;display:block;margin-bottom:4px;}

/* ── Draw button ── */
.btn-draw{width:100%;padding:15px;background:linear-gradient(135deg,#7a1fa0,#C8902A);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;letter-spacing:3px;cursor:pointer;margin-bottom:28px;font-family:inherit;box-shadow:0 4px 20px rgba(200,144,42,.3);transition:opacity .2s,transform .1s;}
.btn-draw:hover{opacity:.9;}
.btn-draw:active{transform:scale(.98);}

/* ── Card area ── */
#card-area{margin-bottom:24px;}
.spread-title{text-align:center;font-size:12px;color:rgba(200,144,42,.6);letter-spacing:3px;margin-bottom:16px;}

.cards-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}

/* Celtic cross layout */
.celtic-grid{display:grid;grid-template-areas:
  ". . top . ."
  "left cross right . future-top"
  ". cover . . future-2"
  ". below . . future-3"
  ". . . . future-bot";
gap:8px;justify-content:center;max-width:480px;margin:0 auto;}
.celtic-grid .card-slot{width:var(--card-w);}
[data-pos=cross]{grid-area:cross;}
[data-pos=cover]{grid-area:cover;transform:rotate(90deg);margin-top:-20px;margin-bottom:-20px;}
[data-pos=top]{grid-area:top;}
[data-pos=below]{grid-area:below;}
[data-pos=left]{grid-area:left;}
[data-pos=right]{grid-area:right;}
[data-pos=future-top]{grid-area:future-top;}
[data-pos=future-2]{grid-area:future-2;}
[data-pos=future-3]{grid-area:future-3;}
[data-pos=future-bot]{grid-area:future-bot;}

/* ── Card ── */
.card-slot{text-align:center;cursor:pointer;}
.card-wrap{
  width:var(--card-w);height:var(--card-h);
  perspective:600px;margin:0 auto 6px;
  position:relative;
}
.card-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.card-wrap.revealed .card-inner{transform:rotateY(180deg);}
.card-face,.card-back{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
}
.card-back{
  background:linear-gradient(135deg,#1a0040,#2d0060);
  border:1.5px solid rgba(200,144,42,.4);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.card-back-inner{
  width:76px;height:134px;
  border:1px solid rgba(200,144,42,.3);
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(45deg,rgba(200,144,42,.05) 0px,rgba(200,144,42,.05) 2px,transparent 2px,transparent 8px);
}
.card-back-inner::after{content:"✦";font-size:22px;color:rgba(200,144,42,.5);}
.card-face{
  background:linear-gradient(160deg,#12003a,#1e0050);
  border:1.5px solid rgba(200,144,42,.5);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  transform:rotateY(180deg);
  padding:8px 4px;
  gap:4px;
}
.card-face.reversed{transform:rotateY(180deg) rotate(180deg);}
.card-symbol{font-size:28px;line-height:1;filter:drop-shadow(0 0 8px rgba(200,144,42,.5));}
.card-number{font-size:9px;color:rgba(200,144,42,.5);letter-spacing:1px;}
.card-name-zh{font-size:12px;font-weight:bold;color:#e8d5ff;line-height:1.2;text-align:center;}
.card-name-en{font-size:8px;color:rgba(200,180,255,.4);text-align:center;}
.reversed-tag{font-size:8px;color:#ff6b6b;letter-spacing:1px;}
.card-pos-label{font-size:10px;color:rgba(200,144,42,.5);margin-top:4px;letter-spacing:1px;}

/* hint */
.card-hint{text-align:center;font-size:12px;color:rgba(200,180,255,.35);margin-bottom:12px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.7}}

/* ── Interpretation ── */
#interp{display:none;}
.interp-card{background:rgba(255,255,255,.04);border:1px solid rgba(200,144,42,.2);border-radius:14px;padding:18px;margin-bottom:12px;backdrop-filter:blur(8px);}
.interp-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.interp-sym{font-size:24px;}
.interp-name{font-size:16px;font-weight:bold;color:#C8902A;}
.interp-sub{font-size:11px;color:rgba(200,180,255,.45);}
.interp-rev{font-size:11px;color:#ff6b6b;margin-left:auto;}
.interp-pos{font-size:11px;color:rgba(200,144,42,.6);border:1px solid rgba(200,144,42,.3);border-radius:10px;padding:2px 8px;}
.kw-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.kw{background:rgba(200,144,42,.1);border:1px solid rgba(200,144,42,.3);border-radius:12px;padding:2px 10px;font-size:11px;color:#C8902A;}
.interp-text{font-size:13px;color:rgba(200,180,255,.8);line-height:1.8;}
.interp-section{margin-top:8px;}
.interp-section-title{font-size:10px;color:rgba(200,144,42,.5);letter-spacing:2px;margin-bottom:4px;}

/* ── Again btn ── */
.btn-again{width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(200,144,42,.3);border-radius:10px;color:#C8902A;font-size:14px;cursor:pointer;font-family:inherit;margin-top:6px;transition:all .2s;}
.btn-again:hover{background:rgba(200,144,42,.1);}

/* ── Footer note ── */
.footer-note{text-align:center;font-size:11px;color:rgba(200,180,255,.2);margin-top:24px;line-height:1.6;}

@media(max-width:500px){
  :root{--card-w:72px;--card-h:118px;}
  .spread-btn{font-size:11px;padding:8px 4px;}
  .hero h2{font-size:20px;}
}
</style>
</head>

  12:{up:'滋養，創造，關懷',rev:'控制，過度情緒'},
  13:{up:'成熟，穩定，領導',rev:'固執，守舊'},
};

// 建立全牌組
let DECK = [...MAJOR];
SUITS.forEach((suit,si)=>{
  RANKS.forEach((rank,ri)=>{
    DECK.push({
      id:22+si*14+ri,
      name:`${suit.name}${rank}`,
      en:`${rank} of ${suit.name}`,
      sym:suit.sym,
      num:rank,
      suit:suit,
      isMajor:false,
      up:{
        kw:[suit.theme,...(ri<10?['進展','發展']:['成熟','完成'])],
        txt:`${suit.name}${rank}屬${suit.elem}元素（${suit.theme}）。${MINOR_MEANINGS[ri%14]?.up||'能量流動，把握當下。'}`,
        love:suit.name==='聖杯'?'感情上有溫柔的流動，真誠表達情感。':'感情受'+suit.elem+'元素影響，順其自然。',

      rev:{
        kw:[suit.theme,'受阻','需調整'],
        txt:`${suit.name}${rank}逆位：${suit.elem}元素的能量受阻。${MINOR_MEANINGS[ri%14]?.rev||'需要重新檢視方向。'}建議暫停，重新調整策略。`

// ── 牌陣設定 ──
const SPREADS = {
  one:{name:'每日一牌',count:1,positions:['今日指引']},
  three:{name:'三牌陣（過去・現在・未來）',count:3,positions:['過去','現在','未來']},
  five:{name:'五牌陣（全面解讀）',count:5,positions:['現況','挑戰','建議','結果','整體能量']},
  celtic:{name:'凱爾特十字（深度解讀）',count:10,positions:['核心','橫跨','遠因','近因','潛意識','環境','建議','外在影響','希望恐懼','最終結果']},
};
const celticPos = ['cross','cover','below','top','left','right','future-bot','future-3','future-2','future-top'];

let currentSpread = 'one';
let drawnCards = [];
let revealed = [];

function setSpread(type, btn) {
  currentSpread = type;
  document.querySelectorAll('.spread-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startReading() {
  const sp = SPREADS[currentSpread];
  const shuffled = shuffle(DECK);
  drawnCards = shuffled.slice(0, sp.count).map(c=>({
    ...c,
    reversed: Math.random() > 0.6
  }));
  revealed = new Array(sp.count).fill(false);

  document.getElementById('card-area').style.display = 'block';
  document.getElementById('interp').style.display = 'none';
  document.getElementById('interp').innerHTML = '';
  document.getElementById('spread-title').textContent = '✦ ' + sp.name + ' ✦';
  document.getElementById('card-hint').style.display = 'block';

  renderCards();
  document.getElementById('card-area').scrollIntoView({behavior:'smooth'});
}

function renderCards() {
  const sp = SPREADS[currentSpread];
  const cont = document.getElementById('cards-container');

  if(currentSpread === 'celtic') {
    cont.innerHTML = `<div class="celtic-grid">${drawnCards.map((c,i)=>cardHTML(c,i,sp.positions[i],celticPos[i])).join('')}</div>`;
  } else {
    cont.innerHTML = `<div class="cards-row">${drawnCards.map((c,i)=>cardHTML(c,i,sp.positions[i])).join('')}</div>`;
  }
}

function cardHTML(card, idx, posLabel, celticArea='') {
  const areaAttr = celticArea ? `data-pos="${celticArea}"` : '';
  return `<div class="card-slot" ${areaAttr} onclick="revealCard(${idx})">
    <div class="card-wrap" id="cw-${idx}">
      <div class="card-inner">
        <div class="card-back"><div class="card-back-inner"></div></div>
        <div class="card-face${card.reversed?' reversed':''}" id="cf-${idx}">
          <div class="card-number">${card.num||''}</div>
          <div class="card-symbol">${card.sym}</div>
          <div class="card-name-zh">${card.name}</div>
          <div class="card-name-en">${card.en}</div>
          ${card.reversed?'<div class="reversed-tag">逆位</div>':''}
        </div>
      </div>
    </div>
    <div class="card-pos-label">${posLabel}</div>
  </div>`;
}

function revealCard(idx) {
  if(revealed[idx]) return;
  revealed[idx] = true;
  document.getElementById('cw-'+idx).classList.add('revealed');

  // 顯示提示直到全部翻開
  const allRevealed = revealed.every(v=>v);
  if(allRevealed) {
    document.getElementById('card-hint').style.display = 'none';
    showInterpretation();
  }
}

function showInterpretation() {
  const sp = SPREADS[currentSpread];
  const q = document.getElementById('question').value.trim();
  let html = '';

  if(q) html += `<div style="background:rgba(200,144,42,.08);border:1px solid rgba(200,144,42,.2);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:rgba(200,180,255,.7);">💬 你的問題：<strong style="color:#C8902A;">${q}</strong></div>`;

  drawnCards.forEach((card,i)=>{
    const data = card.reversed ? card.rev : card.up;
    html += `<div class="interp-card">
      <div class="interp-header">
        <div class="interp-sym">${card.sym}</div>
        <div>
          <div class="interp-name">${card.name} ${card.reversed?'<span style="color:#ff6b6b;font-size:12px;">（逆位）</span>':''}</div>
          <div class="interp-sub">${card.en}${card.num?' · '+card.num:''}</div>
        </div>
        <div class="interp-pos">${sp.positions[i]}</div>
      </div>
      <div class="kw-row">${data.kw.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
      <div class="interp-text">${data.txt}</div>
      ${!card.reversed && card.up.love ? `
      <div class="interp-section">
        <div class="interp-section-title">❤️ 感情</div>
        <div class="interp-text">${card.up.love}</div>
      </div>
      <div class="interp-section">
        <div class="interp-section-title">💼 事業</div>
        <div class="interp-text">${card.up.career}</div>
      </div>` : ''}
    </div>`;
  });

  // 整體總結
  const majorCount = drawnCards.filter(c=>c.id<22).length;
  const revCount = drawnCards.filter(c=>c.reversed).length;
  let summary = '';
  if(majorCount >= Math.ceil(drawnCards.length/2)) summary += `本次牌陣中大阿爾克那佔多數（${majorCount}張），代表此問題與命運、靈魂層面的課題高度相關。`;
  if(revCount === 0) summary += '所有牌均為正位，能量流動順暢，方向明確。';
  else if(revCount >= drawnCards.length) summary += '所有牌均為逆位，建議暫停、重新審視，能量正在醞釀轉化。';

  if(summary) html += `<div class="interp-card" style="border-color:rgba(200,144,42,.4);">
    <div class="interp-header"><div class="interp-sym">✦</div><div><div class="interp-name">整體訊息</div></div></div>
    <div class="interp-text">${summary}</div>
  </div>`;

  html += `<button class="btn-again" onclick="resetReading()">🔮 重新抽牌</button>`;

  const interp = document.getElementById('interp');
  interp.innerHTML = html;
  interp.style.display = 'block';
  interp.scrollIntoView({behavior:'smooth'});
}

function resetReading() {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('interp').style.display = 'none';
  document.getElementById('interp').innerHTML = '';
  document.getElementById('question').value = '';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
